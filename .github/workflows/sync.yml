name: Sync Blogger vers GitHub Pages

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      force_reimport:
        description: "Reimporter tous les articles ?"
        required: false
        default: "false"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install requests html2text

      - name: Reset import state
        if: github.event.inputs.force_reimport == 'true'
        run: rm -f scripts/imported_ids.json

      - name: Import poems from Blogger
        env:
          BLOGGER_API_KEY: ${{ secrets.BLOGGER_API_KEY }}
        run: |
          sed -i "s|AIzaSyAlZcoFvzlr7KaMzyfL4L6vYEvMj2QQLyE|$BLOGGER_API_KEY|g" scripts/import_blogger.py
          python3 scripts/import_blogger.py

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.128.0"
          extended: true

      - name: Build Hugo site
        run: hugo --minify
        working-directory: hugo-site

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./hugo-site/public

      - name: Save import state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update imported_ids.json"
          file_pattern: "scripts/imported_ids.json hugo-site/content/poemes/*.md"
