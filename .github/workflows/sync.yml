name: Sync Blogger vers Netlify

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      force_reimport:
        description: "Reimporter tous les articles ?"
        required: false
        default: "false"

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install requests html2text

      - name: Reset import state
        if: github.event.inputs.force_reimport == 'true'
        run: rm -f scripts/imported_ids.json

      - name: Import poems from Blogger
        env:
          BLOGGER_API_KEY: ${{ secrets.BLOGGER_API_KEY }}
        run: |
          sed -i "s|AIzaSyAlZcoFvzlr7KaMzyfL4L6vYEvMj2QQLyE|$BLOGGER_API_KEY|g" scripts/import_blogger.py
          python3 scripts/import_blogger.py

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.128.0"
          extended: true

      - name: Build Hugo site
        run: hugo --minify
        working-directory: hugo-site

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: "hugo-site/public"
          production-branch: main
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Auto-sync Blogger ${{ github.run_number }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Save import state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update imported_ids.json"
          file_pattern: "scripts/imported_ids.json hugo-site/content/poemes/*.md"
