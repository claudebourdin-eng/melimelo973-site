{{ define "main" }}
<div class="page-header">
    <h1>{{ .Title }}</h1>
    <p>{{ len .Pages }} poemes</p>
</div>
<div class="poem-list">
    {{ range .Pages.ByDate.Reverse }}
    <article class="poem-item">
        <a href="{{ .RelPermalink }}">
            <h2>{{ .Title }}</h2>
            <div class="meta">
                <time>{{ .Date.Format "02/01/2006" }}</time>
                {{ range .Params.tags }}<span class="tag">{{ . }}</span>{{ end }}
            </div>
        </a>
    </article>
    {{ end }}
</div>
{{ end }}
