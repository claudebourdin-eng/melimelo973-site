backend:
  name: github
  repo: claudebourdin-eng/claudebourdin-eng.github.io
  branch: main
  base_url: https://cms-auth.netlify.app

media_folder: hugo-site/static/images
public_folder: /images

collections:
  - name: poemes
    label: Poemes
    folder: hugo-site/content/poemes
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: Titre
        name: title
        widget: string
      - label: Date
        name: date
        widget: datetime
      - label: Themes
        name: tags
        widget: list
        required: false
      - label: Brouillon
        name: draft
        widget: boolean
        default: false
      - label: Contenu
        name: body
        widget: markdown
